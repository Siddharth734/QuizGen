<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer diamond (◈ outer shape) -->
  <polygon
    points="50,8 92,50 50,92 8,50"
    fill="none"
    stroke="#00ff90"
    stroke-width="3"
    filter="url(#glow)"
  />

  <!-- Inner diamond (◈ inner square rotated) -->
  <polygon
    points="50,24 76,50 50,76 24,50"
    fill="#00ff90"
    stroke="#00ff90"
    stroke-width="2"
    filter="url(#glow)"
  />

</svg>